<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מארחי שבת</title>

  <!-- ── External libraries ── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Fonts ── -->
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..1000&family=Inter:wght@300;400;500;600;700;800;900;1000&display=swap" rel="stylesheet" />

  <!-- ── Design system (tokens, animations, components) ── -->
  <link rel="stylesheet" href="design.css" />

  <!-- ── Leaflet map ── -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ── Tailwind custom colour palette
       Must run after Tailwind CDN loads.
       Colours are kept in sync with --brand-* and --warm-* vars in design.css
  ── -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  'var(--brand-50)',
            100: 'var(--brand-100)',
            200: 'var(--brand-200)',
            300: 'var(--brand-300)',
            400: 'var(--brand-400)',
            500: 'var(--brand-500)',
            600: 'var(--brand-600)', /* primary */
            700: 'var(--brand-700)',
            800: 'var(--brand-800)',
            900: 'var(--brand-900)',
            },
            warm: {
              50:  'var(--warm-50)',
              100: 'var(--warm-100)',
              200: 'var(--warm-200)',
              300: 'var(--warm-300)',
              400: 'var(--warm-400)',
              500: 'var(--warm-500)',
              600: 'var(--warm-600)',
            },
            support: {
              50:  'var(--support-50)',
              100: 'var(--support-100)',
              500: 'var(--support-500)',
              600: 'var(--support-600)',
            }
          }, fontFamily: {
          sans: ['var(--font-primary)', 'Assistant', 'Inter', 'sans-serif'],
        },
        fontSize: {
          'xs':   'var(--font-size-xs)',
          'sm':   'var(--font-size-sm)',
          'base': 'var(--font-size-base)',
          'lg':   'var(--font-size-lg)',
          'xl':   'var(--font-size-xl)',
          '2xl':  'var(--font-size-2xl)',
          '3xl':  'var(--font-size-3xl)',
        },
        fontWeight: {
          regular:   'var(--font-weight-regular)',
          medium:    'var(--font-weight-medium)',
          semibold:  'var(--font-weight-semibold)',
          bold:      'var(--font-weight-bold)',
          extrabold: 'var(--font-weight-extrabold)',
        }
          
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!--
    Load order (each file depends on the ones above it):
      1. translations.js        — language strings + LangContext + LangToggle
      2. components.js          — shared UI: Btn, Input, Card, Tag, …
      3. solider_side/S*.js     — soldier screens S1–S15
      4. family side/screens-host.js — host screens S16–S20
      5. app.js                 — App router + ReactDOM.render
  -->
  <script type="text/babel" src="translations.js"></script>
  <script type="text/babel" src="components.js"></script>

  <!-- Soldier screens -->
  <script type="text/babel" src="solider_side/S0Login.js"></script>
  <script type="text/babel" src="solider_side/S1Welcome.js"></script>
  <script type="text/babel" src="solider_side/S2Explain.js"></script>
  <script type="text/babel" src="solider_side/S3Account.js"></script>
  <script type="text/babel" src="solider_side/S5Service.js"></script>
  <script type="text/babel" src="solider_side/S6Upload.js"></script>
  <script type="text/babel" src="solider_side/S7Kosher.js"></script>
  <script type="text/babel" src="solider_side/S9Allergies.js"></script>
  <script type="text/babel" src="solider_side/S10Prefs.js"></script>
  <script type="text/babel" src="solider_side/S11Profile.js"></script>
  <script type="text/babel" src="solider_side/S12Summary.js"></script>
  <script type="text/babel" src="solider_side/S13S14.js"></script>
  <script type="text/babel" src="solider_side/S15Home.js"></script>
  <script type="text/babel" src="solider_side/S21SoldierProfile.js"></script>

  <!-- Host screens -->
  <script type="text/babel" src="family side/screens-host.js"></script>
  <script type="text/babel" src="family side/S22HostProfile.js"></script>

  <!-- App -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
