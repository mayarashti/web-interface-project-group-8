<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מארחי שבת</title>

  <!-- ── External libraries ── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Pinned to Babel 7: its React preset defaults to the classic runtime
       (React.createElement). Babel 8's "latest" switched to the automatic
       runtime, which emits `import ... "react/jsx-runtime"` and breaks our
       CDN/UMD setup (blank page). Do not change to an unpinned/v8 URL. -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <!-- ── Fonts ── -->
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..1000&family=Inter:wght@300;400;500;600;700;800;900;1000&display=swap" rel="stylesheet" />

  <!-- ── Design system (tokens, animations, components) ── -->
  <link rel="stylesheet" href="core/design.css" />
  <link rel="icon" type="image/x-icon" href="1memula.png">

  <!-- ── Leaflet map ── -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ── Tailwind custom colour palette
       Must run after Tailwind CDN loads.
       Colours are kept in sync with --brand-* and --warm-* vars in design.css
  ── -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  'var(--brand-50)',
            100: 'var(--brand-100)',
            200: 'var(--brand-200)',
            300: 'var(--brand-300)',
            400: 'var(--brand-400)',
            500: 'var(--brand-500)',
            600: 'var(--brand-600)', /* primary */
            700: 'var(--brand-700)',
            800: 'var(--brand-800)',
            900: 'var(--brand-900)',
            },
            warm: {
              50:  'var(--warm-50)',
              100: 'var(--warm-100)',
              200: 'var(--warm-200)',
              300: 'var(--warm-300)',
              400: 'var(--warm-400)',
              500: 'var(--warm-500)',
              600: 'var(--warm-600)',
            },
            support: {
              50:  'var(--support-50)',
              100: 'var(--support-100)',
              500: 'var(--support-500)',
              600: 'var(--support-600)',
            }
          }, fontFamily: {
          sans: ['var(--font-primary)', 'Assistant', 'Inter', 'sans-serif'],
        },
        fontSize: {
          'xs':   'var(--font-size-xs)',
          'sm':   'var(--font-size-sm)',
          'base': 'var(--font-size-base)',
          'lg':   'var(--font-size-lg)',
          'xl':   'var(--font-size-xl)',
          '2xl':  'var(--font-size-2xl)',
          '3xl':  'var(--font-size-3xl)',
        },
        fontWeight: {
          regular:   'var(--font-weight-regular)',
          medium:    'var(--font-weight-medium)',
          semibold:  'var(--font-weight-semibold)',
          bold:      'var(--font-weight-bold)',
          extrabold: 'var(--font-weight-extrabold)',
        }
          
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', function(e) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color: #ef4444; background: #fef2f2; border: 1px solid #fee2e2; padding: 24px; border-radius: 12px; margin: 20px; font-family: system-ui, sans-serif; direction: ltr; text-align: left;">' +
          '<h2 style="margin-top:0; color: #991b1b;">JavaScript Error Detected</h2>' +
          '<p style="font-weight: bold;">' + e.message + '</p>' +
          '<pre style="background: #ffffff; padding: 12px; border-radius: 6px; overflow: auto; border: 1px solid #f3f4f6; font-size: 13px;">' + (e.error ? e.error.stack : (e.filename + ":" + e.lineno + ":" + e.colno)) + '</pre>' +
          '</div>';
      }
    });
  </script>

  <!--
    Load order (each file depends on the ones above it):
      1. core/translations.js
      2. core/components.js
      3. auth/auth.js
      4. soldier/soldier_registration.js
      5. soldier/soldier_dashboard.js
      6. host/host_registration.js
      7. host/host_dashboard.js
      8. core/app.js
  -->
  <!-- Firebase SDK (Compat Version for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  
  <!-- Initialize Firebase -->
  <script src="core/firebase.js"></script>
  <script src="core/db.js"></script>

  <script type="text/babel" src="core/translations.js"></script>
  <script type="text/babel" src="core/components.js?v=3"></script>
  <script type="text/babel" src="core/address_picker.js"></script>

  <!-- Auth -->
  <script type="text/babel" src="auth/auth.js"></script>

  <!-- Soldier -->
  <script type="text/babel" src="soldier/soldier_registration.js"></script>
  <script type="text/babel" src="soldier/soldier_dashboard.js?v=2"></script>

  <!-- Host -->
  <script type="text/babel" src="host/host_registration.js?v=1"></script>
  <script type="text/babel" src="host/host_dashboard.js?v=8"></script>

  <!-- App -->
  <script type="text/babel" src="core/app.js"></script>
</body>
</html>
