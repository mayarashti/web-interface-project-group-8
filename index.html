<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מארחי שבת</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Heebo', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #fdf8f4; }
    .screen-enter { animation: fadeSlideIn 0.35s ease forwards; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .pulse-ring {
      animation: pulseRing 1.4s ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { transform: scale(1);   opacity: 0.6; }
      80%  { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    input[type=checkbox], input[type=radio] { accent-color: #c2560e; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e4c9b0; border-radius: 4px; }
    .otp-input {
      letter-spacing: 0.45em;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff8f2',
              100: '#fdeedd',
              200: '#fbd5b0',
              300: '#f7b87a',
              400: '#f29346',
              500: '#e87020',
              600: '#c2560e',
              700: '#9c420c',
              800: '#7e3510',
              900: '#672d11',
            },
            warm: {
              50:  '#fdf8f4',
              100: '#f9efe4',
              200: '#f1dcc8',
              300: '#e5c4a2',
              400: '#d4a57a',
              500: '#b8835a',
            }
          }
        }
      }
    }
  </script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── helpers ─── */
const clsx = (...args) => args.filter(Boolean).join(' ');

/* ─── shared components ─── */
function ProgressBar({ step, total }) {
  const pct = Math.round((step / total) * 100);
  return (
    <div className="w-full mb-5">
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-xs font-medium text-brand-600">שלב {step} מתוך {total}</span>
        <span className="text-xs text-warm-500">{pct}%</span>
      </div>
      <div className="h-2 bg-warm-200 rounded-full overflow-hidden">
        <div
          className="h-full bg-gradient-to-l from-brand-500 to-brand-400 rounded-full transition-all duration-500"
          style={{ width: `${pct}%` }}
        />
      </div>
    </div>
  );
}

function Btn({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) {
  const base = 'w-full py-3.5 px-6 rounded-2xl font-semibold text-base transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 active:scale-95';
  const variants = {
    primary:   'bg-brand-600 text-white hover:bg-brand-700 focus:ring-brand-500 shadow-md hover:shadow-lg disabled:opacity-40 disabled:cursor-not-allowed',
    secondary: 'bg-warm-100 text-brand-700 border border-brand-200 hover:bg-warm-200 focus:ring-brand-300',
    ghost:     'text-brand-600 underline underline-offset-2 hover:text-brand-800 py-2',
    outline:   'border-2 border-brand-500 text-brand-600 bg-transparent hover:bg-brand-50 focus:ring-brand-400',
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} className={clsx(base, variants[variant], className)}>
      {children}
    </button>
  );
}

function Input({ label, value, onChange, type = 'text', placeholder = '', error = '', hint = '' }) {
  return (
    <div className="mb-4">
      {label && <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>}
      <input
        type={type}
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        className={clsx(
          'w-full px-4 py-3 rounded-xl border text-base bg-white transition-all duration-150 focus:outline-none focus:ring-2',
          error
            ? 'border-red-400 focus:ring-red-300 bg-red-50'
            : 'border-warm-300 focus:ring-brand-300 focus:border-brand-400'
        )}
      />
      {error && <p className="mt-1.5 text-xs text-red-500 font-medium">{error}</p>}
      {hint && !error && <p className="mt-1.5 text-xs text-warm-500">{hint}</p>}
    </div>
  );
}

function Card({ children, className = '' }) {
  return (
    <div className={clsx('bg-white rounded-3xl shadow-sm border border-warm-200 p-5', className)}>
      {children}
    </div>
  );
}

function Tag({ children }) {
  return (
    <span className="inline-block bg-brand-100 text-brand-700 text-xs font-semibold px-2.5 py-1 rounded-full">
      {children}
    </span>
  );
}

function BackBtn({ onBack }) {
  return (
    <button
      onClick={onBack}
      className="flex items-center gap-1.5 text-brand-600 font-medium text-sm mb-4 hover:text-brand-800 transition-colors"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      חזור
    </button>
  );
}

function CheckRow({ checked, onChange, children }) {
  return (
    <label className="flex items-start gap-3 cursor-pointer group">
      <input
        type="checkbox"
        checked={checked}
        onChange={e => onChange(e.target.checked)}
        className="mt-0.5 w-4.5 h-4.5 flex-shrink-0 cursor-pointer"
      />
      <span className="text-sm text-gray-700 group-hover:text-gray-900 leading-relaxed">{children}</span>
    </label>
  );
}

function RadioGroup({ label, options, value, onChange }) {
  return (
    <div className="mb-5">
      {label && <p className="text-sm font-semibold text-gray-700 mb-2.5">{label}</p>}
      <div className="flex flex-col gap-2.5">
        {options.map(opt => (
          <label key={opt.value} className={clsx(
            'flex items-center gap-3 p-3.5 rounded-xl border cursor-pointer transition-all duration-150',
            value === opt.value
              ? 'border-brand-500 bg-brand-50 shadow-sm'
              : 'border-warm-200 bg-white hover:border-brand-300 hover:bg-warm-50'
          )}>
            <input
              type="radio"
              name={label}
              value={opt.value}
              checked={value === opt.value}
              onChange={() => onChange(opt.value)}
              className="flex-shrink-0"
            />
            <div>
              <span className="text-sm font-medium text-gray-800">{opt.label}</span>
              {opt.sub && <p className="text-xs text-warm-500 mt-0.5">{opt.sub}</p>}
            </div>
          </label>
        ))}
      </div>
    </div>
  );
}

function MultiCheck({ label, options, values, onChange }) {
  const toggle = (key) => {
    if (values.includes(key)) onChange(values.filter(v => v !== key));
    else onChange([...values, key]);
  };
  return (
    <div className="mb-5">
      {label && <p className="text-sm font-semibold text-gray-700 mb-2.5">{label}</p>}
      <div className="flex flex-wrap gap-2">
        {options.map(opt => (
          <button
            key={opt.value}
            type="button"
            onClick={() => toggle(opt.value)}
            className={clsx(
              'px-3.5 py-2 rounded-xl text-sm font-medium border transition-all duration-150',
              values.includes(opt.value)
                ? 'bg-brand-600 text-white border-brand-600 shadow-sm'
                : 'bg-white text-gray-700 border-warm-300 hover:border-brand-400 hover:bg-warm-50'
            )}
          >
            {opt.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function SectionTitle({ icon, title, sub }) {
  return (
    <div className="mb-6">
      {icon && <div className="text-4xl mb-2">{icon}</div>}
      <h1 className="text-2xl font-bold text-gray-900">{title}</h1>
      {sub && <p className="text-sm text-warm-500 mt-1.5 leading-relaxed">{sub}</p>}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════ */

/* SCREEN 1 — Welcome */
function S1Welcome({ onSoldier }) {
  return (
    <div className="screen-enter min-h-screen flex flex-col items-center justify-center px-6 py-10 bg-gradient-to-b from-brand-50 via-warm-50 to-white">
      <div className="w-full max-w-sm text-center">
        <div className="mb-6 flex justify-center">
          <div className="relative">
            <div className="w-24 h-24 rounded-3xl bg-brand-600 flex items-center justify-center shadow-xl">
              <span className="text-4xl">🕯️</span>
            </div>
            <div className="absolute -bottom-2 -left-2 w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center shadow-md text-xl">🏠</div>
          </div>
        </div>

        <h1 className="text-3xl font-extrabold text-gray-900 mb-1 tracking-tight">מארחי שבת</h1>
        <p className="text-sm text-brand-600 font-semibold mb-2 uppercase tracking-widest">Shabbat Hosts</p>
        <p className="text-xl font-semibold text-warm-500 mb-10 leading-snug">
          מצא ארוחת שישי חמה לידך
        </p>

        <div className="space-y-3">
          <Btn onClick={onSoldier} className="text-lg py-4">
            🪖  אני חייל
          </Btn>
          <div className="relative">
            <Btn variant="secondary" disabled className="opacity-60 cursor-not-allowed">
              🏡  אני משפחה מארחת
            </Btn>
            <span className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-amber-400 text-amber-900 text-xs font-bold px-2.5 py-0.5 rounded-full shadow">
              בקרוב
            </span>
          </div>
        </div>

        <p className="mt-8 text-xs text-warm-400">
          מחברים חיילים עם משפחות מארחות לשישי ✨
        </p>
      </div>
    </div>
  );
}

/* SCREEN 2 — Explanation */
function S2Explain({ onNext, onBack }) {
  const features = [
    { icon: '📍', title: 'מיקום קרוב', desc: 'מצא משפחות מארחות בקרבת הבסיס שלך' },
    { icon: '✅', title: 'התאמה אישית', desc: 'כשרות, אלרגיות והעדפות — הכל לפי מה שמתאים לך' },
    { icon: '📅', title: 'גמישות מלאה', desc: 'אשר אירוח לשישי הקרוב בכמה לחיצות' },
    { icon: '🔒', title: 'תקשורת בטוחה', desc: 'דברו עם המשפחה דרך מערכת מוגנת ובטוחה' },
  ];
  return (
    <div className="screen-enter min-h-screen flex flex-col px-5 py-8 max-w-md mx-auto">
      <BackBtn onBack={onBack} />
      <div className="flex-1">
        <SectionTitle icon="👋" title="איך זה עובד?" sub="כל מה שצריך לדעת לפני שמתחילים" />
        <div className="space-y-3 mb-8">
          {features.map(f => (
            <Card key={f.icon} className="flex gap-4 items-start p-4">
              <span className="text-2xl flex-shrink-0 mt-0.5">{f.icon}</span>
              <div>
                <p className="font-semibold text-gray-800 text-sm">{f.title}</p>
                <p className="text-xs text-warm-500 mt-0.5 leading-relaxed">{f.desc}</p>
              </div>
            </Card>
          ))}
        </div>
      </div>
      <Btn onClick={onNext}>התחל הרשמה ←</Btn>
    </div>
  );
}

/* SCREEN 3 — Create Account */
function S3Account({ data, setData, onNext, onBack }) {
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!data.firstName?.trim()) e.firstName = 'שם פרטי הוא שדה חובה';
    if (!data.lastName?.trim())  e.lastName  = 'שם משפחה הוא שדה חובה';
    if (!data.phone?.trim() || data.phone.replace(/\D/g,'').length < 9) e.phone = 'הכנס מספר טלפון תקין';
    if (!data.email?.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) e.email = 'הכנס כתובת אימייל תקינה';
    if (!data.password || data.password.length < 6) e.password = 'סיסמה חייבת להכיל לפחות 6 תווים';
    if (!data.terms) e.terms = 'יש לאשר את תנאי השימוש';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const set = (key) => (val) => setData(prev => ({ ...prev, [key]: val }));

  return (
    <div className="screen-enter min-h-screen flex flex-col px-5 py-8 max-w-md mx-auto">
      <BackBtn onBack={onBack} />
      <ProgressBar step={1} total={13} />
      <SectionTitle icon="📝" title="יצירת חשבון" sub="כמה פרטים קטנים ואתה בפנים!" />

      <div className="flex gap-3">
        <div className="flex-1">
          <Input label="שם פרטי" value={data.firstName||''} onChange={set('firstName')} placeholder="ישראל" error={errors.firstName} />
        </div>
        <div className="flex-1">
          <Input label="שם משפחה" value={data.lastName||''} onChange={set('lastName')} placeholder="כהן" error={errors.lastName} />
        </div>
      </div>
      <Input label="מספר טלפון" type="tel" value={data.phone||''} onChange={set('phone')} placeholder="050-1234567" error={errors.phone} />
      <Input label="אימייל" type="email" value={data.email||''} onChange={set('email')} placeholder="israel@gmail.com" error={errors.email} />
      <Input label="סיסמה" type="password" value={data.password||''} onChange={set('password')} placeholder="לפחות 6 תווים" error={errors.password} hint="הסיסמה שמורה בצורה מאובטחת" />

      <div className="mb-6 mt-1">
        <CheckRow checked={!!data.terms} onChange={set('terms')}>
          <span>
            אני מאשר/ת את{' '}
            <span className="text-brand-600 underline cursor-pointer">תנאי השימוש</span>
            {' '}ו
            <span className="text-brand-600 underline cursor-pointer">מדיניות הפרטיות</span>
          </span>
        </CheckRow>
        {errors.terms && <p className="mt-1.5 text-xs text-red-500 font-medium">{errors.terms}</p>}
      </div>

      <Btn onClick={() => { if (validate()) onNext(); }}>המשך</Btn>
    </div>
  );
}

/* SCREEN 4 — Phone Verification */
function S4Verify({ phone, onNext, onBack }) {
  const [code, setCode] = useState('');
  const [error, setError] = useState('');
  const [sent, setSent] = useState(false);
  const [timer, setTimer] = useState(30);
  const inputRef = useRef();

  useEffect(() => {
    inputRef.current?.focus();
    const t = setInterval(() => setTimer(p => p > 0 ? p - 1 : 0), 1000);
    return () => clearInterval(t);
  }, []);

  const verify = () => {
    if (code === '123456') { onNext(); }
    else setError('קוד שגוי, נסה שוב 🙈');
  };

  const resend = () => { setTimer(30); setSent(true); setError(''); setCode(''); };

  return (
    <div className="screen-enter min-h-screen flex flex-col px-5 py-8 max-w-md mx-auto">
      <BackBtn onBack={onBack} />
      <ProgressBar step={2} total={13} />
      <SectionTitle icon="📱" title="אימות מספר טלפון" />

      <Card className="text-center mb-6 py-6">
        <p className="text-sm text-warm-500 mb-1">שלחנו קוד אימות ב-SMS אל</p>
        <p className="text-lg font-bold text-gray-900 dir-ltr" style={{direction:'ltr'}}>{phone || '050-XXXXXXX'}</p>
        {sent && <p className="text-xs text-green-600 mt-2 font-medium">✅ הקוד נשלח מחדש!</p>}
      </Card>

      <div className="mb-2">
        <label className="block text-sm font-medium text-gray-700 mb-1.5">קוד אימות (6 ספרות)</label>
        <input
          ref={inputRef}
          type="text"
          inputMode="numeric"
          maxLength={6}
          value={code}
          onChange={e => { setCode(e.target.value.replace(/\D/g,'')); setError(''); }}
          placeholder="• • • • • •"
          className={clsx(
            'otp-input w-full px-4 py-4 rounded-xl border text-center bg-white transition-all focus:outline-none focus:ring-2',
            error ? 'border-red-400 focus:ring-red-300 bg-red-50' : 'border-warm-300 focus:ring-brand-300 focus:border-brand-400'
          )}
        />
        {error && <p className="mt-1.5 text-sm text-red-500 font-medium text-center">{error}</p>}
      </div>

      <p className="text-xs text-warm-400 text-center mb-6">
        💡 לצורך הדגמה, הכנס: <strong className="text-brand-600">123456</strong>
      </p>

      <div className="space-y-3">
        <Btn onClick={verify} disabled={code.length !== 6}>אמת</Btn>
        <button
          onClick={resend}
          disabled={timer > 0}
          className="w-full text-center text-sm text-brand-600 font-medium py-2 disabled:text-warm-400 hover:underline transition-colors"
        >
          {timer > 0 ? `שלח קוד מחדש (${timer}ש)` : 'שלח קוד מחדש'}
        </button>
      </div>
    </div>
  );
}

/* SCREEN 5 — Service Status */
function S5Service({ data, setData, onNext, onBack }) {
  const set = (key) => (val) => setData(prev => ({ ...prev, [key]: val }));
  return (
    <div className="screen-enter min-h-screen flex flex-col px-5 py-8 max-w-md mx-auto">
      <BackBtn onBack={onBack} />
      <ProgressBar step={3} total={13} />
      <SectionTitle icon="🪖" title="סטטוס שירות" sub="ספר לנו על השירות הצבאי שלך" />

      <RadioGroup
        label="סוג שירות"
        value={data.serviceType||''}
        onChange={set('serviceType')}
        options={[
          { value: 'regular', label: 'שירות סדיר', sub: 'חייל/ת בשירות חובה' },
          { value: 'reserve', label: 'מילואים', sub: 'שירות מילואים פעיל' },
          { value: 'career', label: 'קבע', sub: 'קצין/ת או נגד קבע' },
        ]}
      />

      <Input
        label="יחידה / בסיס (אופציונלי)"
        value={data.unit||''}
        onChange={set('unit')}
        placeholder="לדוגמה: בסיס רמת דוד, גולני..."
        hint="לא חובה — עוזר להתאמה טובה יותר"
      />

      <div className="mt-auto pt-4">
        <Btn onClick={onNext} disabled={!data.serviceType}>המשך</Btn>
      </div>
    </div>
  );
}

/* SCREEN 6 — Upload Document */
function S6Upload({ data, setData, onNext, onBack }) {
  const [uploaded, setUploaded] = useState(!!data.docUploaded);
  const [docType, setDocType] = useState(data.docType||'');
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const mockUpload = () => {
    if (!docType) return;
    setUploading(true);
    setTimeout(() => {
      setUploading(false);
      setUploaded(true);
      setData(prev => ({ ...prev, docUploaded: true, docType }));
    }, 1800);
  };

  return (
    <div className="screen-enter min-h-screen flex flex-col px-5 py-8 max-w-md mx-auto">
      <BackBtn onBack={onBack} />
      <ProgressBar step={4} total={13} />
      <SectionTitle icon="📄" title="אימות מסמך שירות" sub="העלה מסמך לאימות — הכל מאובטח ומוגן" />

      <RadioGroup
        label="סוג מסמך"
        value={docType}
        onChange={setDocType}
        options={[
          { value: 'tag', label: 'צילום חוגר (תג)' },
          { value: 'reserve', label: 'אישור מילואים' },
          { value: 'other', label: 'מסמך אחר' },
        ]}
      />

      {!uploaded ? (
        <div className="mb-5">
          <div
            onClick={() => docType && mockUpload()}
            className={clsx(
              'border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer transition-all duration-200',
              docType
                ? 'border-brand-400 bg-brand-50 hover:bg-brand-100'
                : 'border-warm-300 bg-warm-50 cursor-not-allowed opacity-60'
            )}
          >
            {uploading ? (
              <div className="flex flex-col items-center gap-3">
                <div className="w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full animate-spin" />
                <p className="text-sm text-brand-600 font-medium">מעלה מסמך...</p>
              </div>
            ) : (
              <div className="flex flex-col items-center gap-2">
                <span className="text-4xl">📸</span>
                <p className="font-semibold text-gray-700 text-sm">לחץ להעלאה / צילום</p>
                <p className="text-xs text-warm-400">JPG, PNG, PDF — עד 10MB</p>
              </div>
            )}
          </div>
          {!docType && <p className="text-xs text-amber-600 mt-2 text-center">בחר סוג מסמך תחילה</p>}
        </div>
      ) : (
        <Card className="flex items-center gap-4 mb-5 border-green-200 bg-green-50">
          <div className="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <span className="text-2xl">✅</span>
          </div>
          <div>
            <p className="font-semibold text-green-800 text-sm">המסמך הועלה בהצלחה!</p>
            <p className="text-xs text-green-600 mt-0.5">הקובץ נשמר בצורה מאובטחת</p>
          </div>
        </Card>
      )}

      <Card className="flex items-start gap-3 mb-6 bg-amber-50 border-amber-200">

/* SCREEN 13 — Verification Pending */
function S13Pending({ onHome, autoApprove }) {
  const [approved, setApproved] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setApproved(true), 3500);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    if (approved) {
      const t = setTimeout(() => autoApprove(), 1200);
      return () => clearTimeout(t);
    }
  }, [approved]);

  return (
    <div className="screen-enter min-h-screen flex flex-col items-center justify-center px-6 py-10 max-w-md mx-auto text-center">
      {!approved ? (
        <>
          <div className="relative mb-8">

              <span className="text-4xl">⏳</span>
            </div>

          <h1 className="text-2xl font-bold text-gray-900 mb-3">הפרופיל שלך בבדיקה</h1>
          <p className="text-sm text-warm-500 leading-relaxed mb-6">

          </p>
          <div className="flex gap-1.5 justify-center">
            {[0,1,2].map(i => (
              <div key={i} className="w-2 h-2 rounded-full bg-brand-400 animate-bounce" style={{animationDelay:`${i*0.15}s`}} />

  const go = (n) => setScreen(n);
  const merge = (obj) => setFormData(prev => ({ ...prev, ...obj }));

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
