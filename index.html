<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מארחי שבת</title>

  <!-- External dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Global styles -->
  <style>
    * { font-family: 'Heebo', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #fdf8f4; }

    .screen-enter { animation: fadeSlideIn 0.35s ease forwards; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .pulse-ring { animation: pulseRing 1.4s ease-out infinite; }
    @keyframes pulseRing {
      0%   { transform: scale(1);   opacity: 0.6; }
      80%  { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    input[type=checkbox], input[type=radio] { accent-color: #c2560e; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e4c9b0; border-radius: 4px; }

    .otp-input { letter-spacing: 0.45em; text-align: center; font-size: 1.5rem; font-weight: 700; }
  </style>

  <!-- Tailwind brand colour config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff8f2',
              100: '#fdeedd',
              200: '#fbd5b0',
              300: '#f7b87a',
              400: '#f29346',
              500: '#e87020',
              600: '#c2560e',
              700: '#9c420c',
              800: '#7e3510',
              900: '#672d11',
            },
            warm: {
              50:  '#fdf8f4',
              100: '#f9efe4',
              200: '#f1dcc8',
              300: '#e5c4a2',
              400: '#d4a57a',
              500: '#b8835a',
            }
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!--
    Scripts are loaded in dependency order:
      1. components.js   — shared UI primitives (Btn, Input, Card, …)
      2. screens-soldier.js — screens 1-15 (soldier flow)
      3. screens-host.js    — screens 16-17 (host family flow)
      4. app.js             — App component + ReactDOM render
  -->
<script type="text/babel" src="components.js"></script>
<script type="text/babel" src="screens-soldier.js"></script>
<script type="text/babel" src="screens-host.js"></script>
<script type="text/babel" src="app.js"></script>
</body>
</html>
